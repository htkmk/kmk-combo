<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>クラシックJP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>クラシックJP コンボ検索</h1>

<!-- 条件 -->
<label>始動技：</label>
<select id="starter">
  <option value="">すべて</option>
  <option value="近A">近A</option>
  <option value="2A">2A</option>
</select>

<label>位置：</label>
<select id="position">
  <option value="">すべて</option>
  <option value="中央">中央</option>
  <option value="端">端</option>
</select>

<hr>

<!-- 結果表示 -->
<div id="result"></div>

<p><a href="index.html">← トップに戻る</a></p>

<script>
// コンボデータ
const combos = [
  {
    starter: "近A",
    position: "中央",
    combo: "近A > 近B > 必殺技",
    note: "基本コンボ"
  },
  {
    starter: "2A",
    position: "端",
    combo: "2A > 2B > 必殺技",
    note: "端用コンボ"
  }
];

// 表示処理
function renderCombos() {
  const starter = document.getElementById("starter").value;
  const position = document.getElementById("position").value;

  const filtered = combos.filter(c => {
    return (starter === "" || c.starter === starter) &&
           (position === "" || c.position === position);
  });

  const result = document.getElementById("result");

  if (filtered.length === 0) {
    result.innerHTML = "<p>該当なし</p>";
    return;
  }

  result.innerHTML = filtered.map(c => `
    <div>
      <h2>${c.combo}</h2>
      <p>始動: ${c.starter}</p>
      <p>位置: ${c.position}</p>
      <p>${c.note}</p>
    </div>
  `).join("");
}

// イベント
document.getElementById("starter").addEventListener("change", renderCombos);
document.getElementById("position").addEventListener("change", renderCombos);

// 初期表示
renderCombos();
</script>

</body>
</html>
