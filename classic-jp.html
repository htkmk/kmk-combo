<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>クラシックJP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>クラシックJP コンボ</h1>

<!-- 条件 -->
<label>位置：</label>
<select id="position">
  <option value="">すべて</option>
  <option value="端背負わせ">端背負わせ</option>
  <option value="端背負わせ付近">端背負わせ付近</option>
  <option value="中央">中央</option>
  <option value="端背負い付近">端背負い付近</option>
  <option value="端背負い">端背負い</option>
</select>

<label>SAゲージ：</label>
<select id="sa">
  <option value="">すべて</option>
  <option value="０ゲージ">０ゲージ</option>
  <option value="１ゲージ">１ゲージ</option>
  <option value="２ゲージ">２ゲージ</option>
  <option value="３ゲージ">３ゲージ</option>
</select>

<hr>

<!-- 結果表示 -->
<div id="result"></div>

<p><a href="index.html">← トップに戻る</a></p>

<script>
// コンボデータ
const combos = [
  {
    position: "近A",
    sa: "中央",
    combo: "近A > 近B > 必殺技",
    note: "基本コンボ"
  },
  {
    position: "2A",
    sa: "端",
    combo: "2A > 2B > 必殺技",
    note: "端用コンボ"
  }
];

// 表示処理
function renderCombos() {
  const position = document.getElementById("position").value;
  const sa = document.getElementById("sa").value;

  const filtered = combos.filter(c => {
    return (position === "" || c.position === position) &&
           (sa === "" || c.sa === sa);
  });

  const result = document.getElementById("result");

  if (filtered.length === 0) {
    result.innerHTML = "<p>該当なし</p>";
    return;
  }

  result.innerHTML = filtered.map(c => `
    <div>
      <h2>${c.combo}</h2>
      <p>始動: ${c.position}</p>
      <p>位置: ${c.sa}</p>
      <p>${c.note}</p>
    </div>
  `).join("");
}

// イベント
document.getElementById("position").addEventListener("change", renderCombos);
document.getElementById("sa").addEventListener("change", renderCombos);

// 初期表示
renderCombos();
</script>

</body>
</html>
