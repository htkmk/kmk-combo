<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>クラシックJP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>クラシックJP コンボ</h1>

  <label>位置：</label>
  <select id="position">
    <option value="">すべて</option>
    <option value="端背負わせ">端背負わせ</option>
    <option value="端背負わせ付近">端背負わせ付近</option>
    <option value="中央">中央</option>
    <option value="端背負い付近">端背負い付近</option>
    <option value="端背負い">端背負い</option>
  </select>

  <label>SAゲージ：</label>
  <select id="sa">
    <option value="">すべて</option>
    <option value="０ゲージ">０ゲージ</option>
    <option value="１ゲージ">１ゲージ</option>
    <option value="２ゲージ">２ゲージ</option>
    <option value="３ゲージ">３ゲージ</option>
  </select>

  <label>ドライブゲージ：</label>
  <select id="drive">
    <option value="">すべて</option>
    <option value="０本">０本</option>
    <option value="１本">１本</option>
    <option value="２本">２本</option>
    <option value="３本">３本</option>
    <option value="４本">４本</option>
    <option value="５本">５本</option>
    <option value="６本">６本</option>
  </select>

  <hr>

  <div id="result"></div>

  <p><a href="index.html">← トップに戻る</a></p>

  <script>
    const combos = [
      {
        position: "中央",
        sa: "０ゲージ",
        drive: "０本",
        combo: "近A > 近B > 必殺技",
        note: "基本コンボ"
      },
      {
        position: "端背負わせ",
        sa: "１ゲージ",
        drive: "２本",
        combo: "2A > 2B > SA1",
        note: "端用コンボ"
      },
      {
        position: "端背負わせ付近",
        sa: "２ゲージ",
        drive: "３本",
        combo: "ジャンプ攻撃 > 近A > 必殺技 > SA2",
        note: "火力重視"
      }
    ];

    function renderCombos() {
      const position = document.getElementById("position").value;
      const sa = document.getElementById("sa").value;
      const drive = document.getElementById("drive").value;

      const filtered = combos.filter(c => {
        return (position === "" || c.position === position) &&
               (sa === "" || c.sa === sa) &&
               (drive === "" || c.drive === drive);
      });

      const result = document.getElementById("result");

      if (filtered.length === 0) {
        result.innerHTML = "<p>該当なし</p>";
        return;
      }

      result.innerHTML = filtered.map(c => `
        <div class="combo-card">
          <h2>${c.combo}</h2>
          <p>位置: ${c.position}</p>
          <p>SAゲージ: ${c.sa}</p>
          <p>ドライブゲージ: ${c.drive}</p>
          <p>${c.note}</p>
        </div>
      `).join("");
    }

    document.getElementById("position").addEventListener("change", renderCombos);
    document.getElementById("sa").addEventListener("change", renderCombos);
    document.getElementById("drive").addEventListener("change", renderCombos);

    renderCombos();
  </script>

</body>
</html>
