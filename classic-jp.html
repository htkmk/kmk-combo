<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>クラシックJP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>クラシックJP コンボ</h1>

  <label>位置：</label>
  <select id="position">
    <option value="">すべて</option>
    <option value="端背負わせ">端背負わせ</option>
    <option value="端背負わせ付近">端背負わせ付近</option>
    <option value="中央">中央</option>
    <option value="端背負い付近">端背負い付近</option>
    <option value="端背負い">端背負い</option>
  </select>

    <label>ドライブゲージ：</label>
  <select id="drive">
    <option value="">すべて</option>
    <option value="0">０本</option>
    <option value="1">１本</option>
    <option value="2">２本</option>
    <option value="3">３本</option>
    <option value="4">４本</option>
    <option value="5">５本</option>
    <option value="6">６本</option>
  </select>

  <label>SAゲージ：</label>
  <select id="sa">
    <option value="">すべて</option>
    <option value="0">０ゲージ</option>
    <option value="1">１ゲージ</option>
    <option value="2">２ゲージ</option>
    <option value="3">３ゲージ</option>
  </select>

    <label>始動技：</label>
  <select id="starter">
    <option value="">すべて</option>
    <option value="インパクトパニカン">インパクトパニカン</option>
    <option value="スタン">スタン</option>
  </select>

  <hr>

  <div id="result"></div>

  <p><a href="index.html">← トップに戻る</a></p>

  <script>
    const combos = [
      {
        combo: "遅らせ5大P > 強ストリボーグ > 中トルバラン > 強トリグラフ",
        position: "中央",
        drive: 0,
        sa: 0,
        starter: "インパクトパニカン",
        note: "インパクトパ二カン時にDゲージを使うには少ない時はこれ一択。各種設置が安全にできる。"
      },
      {
        starter: "インパクトパニカン",
        position: "端背負わせ",
        sa: 1,
        drive: 2,
        combo: "2A > 2B > SA1",
        note: "端用コンボ"
      },
      {
        starter: "スタン",
        position: "端背負わせ付近",
        sa: 2,
        drive: 3,
        combo: "ジャンプ攻撃 > 近A > 必殺技 > SA2",
        note: "火力重視"
      }
    ];

    function renderCombos() {
      const starter = document.getElementById("starter").value;
      const position = document.getElementById("position").value;
      const sa = document.getElementById("sa").value;
      const drive = document.getElementById("drive").value;

      const filtered = combos.filter(c => {
        return (starter === "" || c.starter === starter) &&
               (position === "" || c.position === position) &&
               (sa === "" || Number(sa) >= c.sa) &&
               (drive === "" || Number(drive) >= c.drive);
      });

      const result = document.getElementById("result");

      if (filtered.length === 0) {
        result.innerHTML = "<p>該当なし</p>";
        return;
      }

      result.innerHTML = filtered.map(c => `
        <div class="combo-card">
          <h2>${c.combo}</h2>
          <p>始動技: ${c.starter}</p>
          <p>位置: ${c.position}</p>
          <p>必要SAゲージ: ${c.sa}</p>
          <p>必要ドライブゲージ: ${c.drive}</p>
          <p>${c.note}</p>
        </div>
      `).join("");
    }

    document.getElementById("starter").addEventListener("change", renderCombos);
    document.getElementById("position").addEventListener("change", renderCombos);
    document.getElementById("sa").addEventListener("change", renderCombos);
    document.getElementById("drive").addEventListener("change", renderCombos);

    renderCombos();
  </script>

</body>
</html>
